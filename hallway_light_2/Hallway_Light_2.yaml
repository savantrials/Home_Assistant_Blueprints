blueprint:
  name: Motion Light With Blocking Sensor And Time Window
  description: >
    Turn on a dimmable light and optional switches, scenes, and scripts when
    motion is detected, but only if a second motion-style sensor is inactive
    and the current time is inside the configured time window. Once both
    motion sensors are clear, the configured delay begins and then the selected
    entities are turned off. Scenes are stateless in Home Assistant, so an
    optional off scene can be applied after the delay instead.
  domain: automation
  input:
    motion_sensor:
      name: Motion sensor
      description: Motion sensor that triggers this automation.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: motion
            - domain: binary_sensor
              device_class: occupancy
            - domain: binary_sensor
              device_class: presence
    blocking_sensor:
      name: Blocking motion sensor
      description: If this sensor is on, the light will not turn on.
      selector:
        entity:
          filter:
            - domain: binary_sensor
              device_class: motion
            - domain: binary_sensor
              device_class: occupancy
            - domain: binary_sensor
              device_class: presence
    light_target:
      name: Dimmable light
      description: Light to turn on when motion is detected.
      selector:
        target:
          entity:
            - domain: light
    switch_target:
      name: Switches
      description: Optional switches to turn on with motion and turn off later.
      default: {}
      selector:
        target:
          entity:
            - domain: switch
    on_scene:
      name: On scene
      description: Optional scene to activate when motion is detected.
      default: {}
      selector:
        target:
          entity:
            - domain: scene
    off_scene:
      name: Off scene
      description: >
        Optional scene to activate after the off delay. This is useful because
        scenes cannot be turned off directly in Home Assistant.
      default: {}
      selector:
        target:
          entity:
            - domain: scene
    script_entities:
      name: Scripts
      description: Optional scripts to start on motion and stop after the delay.
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: script
    brightness_pct:
      name: Brightness
      description: Brightness percentage to use when turning on the light.
      default: 35
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: slider
          unit_of_measurement: "%"
    start_time:
      name: Start time
      description: Earliest time this automation is allowed to run.
      default: "00:00:00"
      selector:
        time:
    end_time:
      name: End time
      description: Latest time this automation is allowed to run.
      default: "23:59:59"
      selector:
        time:
    off_delay:
      name: Off delay
      description: >
        How long the selected entities should stay active after both motion
        sensors are clear before turning off.
      default:
        minutes: 5
      selector:
        duration:

mode: restart

variables:
  motion_sensor_entity: !input motion_sensor
  blocking_sensor_entity: !input blocking_sensor
  switch_target_entities: !input switch_target
  on_scene_target: !input on_scene
  off_scene_target: !input off_scene
  script_target_entities: !input script_entities

triggers:
  - trigger: state
    entity_id: !input motion_sensor
    from: "off"
    to: "on"

conditions:
  - condition: state
    entity_id: !input blocking_sensor
    state: "off"
  - condition: time
    after: !input start_time
    before: !input end_time

actions:
  - alias: Turn on the selected light at the configured brightness
    action: light.turn_on
    target: !input light_target
    data:
      brightness_pct: !input brightness_pct
  - if:
      - condition: template
        value_template: "{{ switch_target_entities | length > 0 }}"
    then:
      - alias: Turn on optional switches
        action: switch.turn_on
        target: !input switch_target
  - if:
      - condition: template
        value_template: "{{ on_scene_target | length > 0 }}"
    then:
      - alias: Activate optional on scene
        action: scene.turn_on
        target: !input on_scene
  - if:
      - condition: template
        value_template: "{{ script_target_entities | count > 0 }}"
    then:
      - alias: Start optional scripts
        action: script.turn_on
        target:
          entity_id: !input script_entities
  - alias: Wait until both motion sensors are clear for the full off delay
    repeat:
      sequence:
        - alias: Wait until both motion sensors are clear
          wait_template: >
            {{ is_state(motion_sensor_entity, 'off')
               and is_state(blocking_sensor_entity, 'off') }}
        - alias: Keep entities active for the configured delay
          delay: !input off_delay
      until:
        - condition: template
          value_template: >
            {{ is_state(motion_sensor_entity, 'off')
               and is_state(blocking_sensor_entity, 'off') }}
  - alias: Turn off the selected light
    action: light.turn_off
    target: !input light_target
  - if:
      - condition: template
        value_template: "{{ switch_target_entities | length > 0 }}"
    then:
      - alias: Turn off optional switches
        action: switch.turn_off
        target: !input switch_target
  - if:
      - condition: template
        value_template: "{{ script_target_entities | count > 0 }}"
    then:
      - alias: Stop optional scripts
        action: script.turn_off
        target:
          entity_id: !input script_entities
  - if:
      - condition: template
        value_template: "{{ off_scene_target | length > 0 }}"
    then:
      - alias: Activate optional off scene
        action: scene.turn_on
        target: !input off_scene
