blueprint:
  name: Master Bathroom Lights
  description: >
    Turn on a bathroom light, dimmer, or switched light device from a door
    contact sensor or a motion sensor. Door-only activation turns off as soon
    as the door closes. Door plus motion waits until the door is closed and
    motion has cleared, then applies the selected delay. Motion activation
    while the door is closed waits for motion to clear, then applies its
    selected delay.
  domain: automation
  author: Codex
  homeassistant:
    min_version: "2026.5.1"
  input:
    entities:
      name: Entities
      icon: mdi:devices
      input:
        door_sensor:
          name: Door contact sensor
          description: Binary sensor where on means open and off means closed.
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class: door
                - domain: binary_sensor
                  device_class: opening
                - domain: binary_sensor
                  device_class: window
        motion_sensor:
          name: Motion sensor
          description: Binary sensor where on means motion detected and off means clear.
          selector:
            entity:
              filter:
                - domain: binary_sensor
                  device_class: motion
                - domain: binary_sensor
                  device_class: occupancy
        light_device:
          name: Light device
          description: Select a device that exposes a light or switch entity.
          selector:
            device:
              entity:
                domain:
                  - light
                  - switch
    timing:
      name: Timing
      icon: mdi:timer-outline
      input:
        door_motion_clear_delay:
          name: Door plus motion keep-on time
          description: Time to keep the light on after the door is closed and motion has stopped.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:
        motion_clear_delay:
          name: Motion-only keep-on time
          description: Time to keep the light on after motion has stopped when the door is closed.
          default:
            hours: 0
            minutes: 2
            seconds: 0
          selector:
            duration:

mode: restart
max_exceeded: silent

variables:
  door_sensor_entity: !input door_sensor
  motion_sensor_entity: !input motion_sensor

triggers:
  - trigger: state
    entity_id: !input door_sensor
    from: "off"
    to: "on"
    id: door_opened
  - trigger: state
    entity_id: !input motion_sensor
    from: "off"
    to: "on"
    id: motion_detected

actions:
  - action: homeassistant.turn_on
    target:
      device_id: !input light_device

  - choose:
      - conditions:
          - condition: trigger
            id: door_opened
          - condition: template
            value_template: "{{ is_state(motion_sensor_entity, 'off') }}"
        sequence:
          - wait_template: "{{ is_state(door_sensor_entity, 'off') or is_state(motion_sensor_entity, 'on') }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ is_state(door_sensor_entity, 'off') and is_state(motion_sensor_entity, 'off') }}"
                sequence:
                  - action: homeassistant.turn_off
                    target:
                      device_id: !input light_device
            default:
              - wait_template: "{{ is_state(door_sensor_entity, 'off') and is_state(motion_sensor_entity, 'off') }}"
              - delay: !input door_motion_clear_delay
              - action: homeassistant.turn_off
                target:
                  device_id: !input light_device

      - conditions:
          - condition: trigger
            id: door_opened
        sequence:
          - wait_template: "{{ is_state(door_sensor_entity, 'off') and is_state(motion_sensor_entity, 'off') }}"
          - delay: !input door_motion_clear_delay
          - action: homeassistant.turn_off
            target:
              device_id: !input light_device

      - conditions:
          - condition: trigger
            id: motion_detected
          - condition: state
            entity_id: !input door_sensor
            state: "off"
        sequence:
          - wait_template: "{{ is_state(motion_sensor_entity, 'off') }}"
          - delay: !input motion_clear_delay
          - action: homeassistant.turn_off
            target:
              device_id: !input light_device

    default:
      - wait_template: "{{ is_state(door_sensor_entity, 'off') and is_state(motion_sensor_entity, 'off') }}"
      - delay: !input door_motion_clear_delay
      - action: homeassistant.turn_off
        target:
          device_id: !input light_device

